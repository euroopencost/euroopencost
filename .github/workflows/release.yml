name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run tests
        run: go test ./...

  build:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: ""
          - os: darwin
            arch: arm64
            suffix: ""
          - os: darwin
            arch: amd64
            suffix: ""
          - os: windows
            arch: amd64
            suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          OUTPUT="eucost-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }}"
          go build -o "$OUTPUT" ./cmd/eucost

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: eucost-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }}
          generate_release_notes: true
