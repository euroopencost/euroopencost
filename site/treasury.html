<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <main class="flex-1 min-w-0">

    <!-- Gate -->
    <div id="treasury-gate" class="bg-white border border-eu-border shadow-sm flex flex-col items-center justify-center" style="min-height:400px">
      <p class="text-base font-bold text-gray-900 flex items-center justify-center mb-4">
        <i class="fa-solid fa-lock text-yellow-500 mr-2"></i>
        PREMIUM ACCESS REQUIRED
        <i class="fa-solid fa-lock text-yellow-500 ml-2"></i>
      </p>
      <a href="index.html#settings" class="bg-eu-blue text-white px-6 py-2 text-sm font-medium hover:bg-blue-900 transition-colors" style="text-decoration:none;">
        UPGRADE TO PRO
      </a>
    </div>

    <!-- Content -->
    <div id="treasury-main" class="hidden">
      <div class="mb-8 flex justify-between items-end">
        <div>
          <h1 class="text-4xl font-normal text-gray-900 leading-tight">Treasury</h1>
          <p class="mt-2 text-sm text-gray-500 uppercase tracking-wider">ANALYSIS HISTORY</p>
        </div>
        <button onclick="clearHistory()" class="bg-white border border-gray-300 text-gray-700 px-4 py-2 text-sm font-medium hover:bg-gray-50">
          CLEAR HISTORY
        </button>
      </div>
      <div id="reports-list" class="space-y-4"></div>
    </div>

  </main>
</div>

<div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 text-white text-xs font-bold px-5 py-3 shadow-lg transition-all duration-300 bg-eu-blue pointer-events-none" style="opacity:0">
  <span id="toast-msg"></span>
</div>

<script>
const SUPABASE_URL      = 'https://pquqtyfezwagzeujweqa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxdXF0eWZlendhZ3pldWp3ZXFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1OTk5ODIsImV4cCI6MjA5MDE3NTk4Mn0.SP8ZvG64595-IflvEhZTodWVzGJYoqszfj1zlRGR66M';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let authUser = null, authProfile = null;
const state = {
  history: JSON.parse(localStorage.getItem('eucost_history') || '[]'),
};
function isPro() { return authProfile?.is_pro === true; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n) { return Number(n).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function downloadFile(name, content, type) {
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([content],{type})); a.download = name; a.click(); URL.revokeObjectURL(a.href);
}
function showToast(msg, isError) {
  const t = document.getElementById('toast'), m = document.getElementById('toast-msg');
  if (!t||!m) return; m.textContent = msg;
  t.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 z-50 text-white text-xs font-bold px-5 py-3 shadow-lg transition-all duration-300 pointer-events-none '+(isError?'bg-red-600':'bg-eu-blue');
  t.style.opacity='1'; setTimeout(()=>{t.style.opacity='0';},3500);
}
function generateSimpleHTMLReport(entry) {
  const d = entry.data;
  const rows = (d.resources||[]).map(r=>`<tr><td>${escHtml(r.name)}</td><td>${escHtml(r.display_type||r.type||'')}</td><td style="text-align:right">€ ${r.monthly_price}</td></tr>`).join('');
  return `<!DOCTYPE html><html><head><meta charset="utf-8"/><title>eucost Report</title><style>body{font-family:Inter,sans-serif;max-width:800px;margin:40px auto;padding:20px}table{width:100%;border-collapse:collapse}td,th{padding:10px;border-bottom:1px solid #e5e7eb}th{background:#f3f4f6;font-size:11px;text-transform:uppercase;letter-spacing:1px}h1{color:#0a1945}.score{color:#10b981;font-size:48px;font-weight:800}</style></head><body><h1>EuroOpenCost Report</h1><p style="color:#6b7280">${entry.date}</p><div class="score">${entry.score}%</div><p style="color:#10b981;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:12px">Sovereign Score</p><h2>Summary</h2><p>Resources: ${entry.resources} · Monthly: €${fmt(entry.monthly)}</p><h2>Resource Inventory</h2><table><thead><tr><th>Resource</th><th>Type</th><th style="text-align:right">€/month</th></tr></thead><tbody>${rows}</tbody></table><p style="font-size:11px;color:#9ca3af;margin-top:40px">Generated by EuroOpenCost v0.1.0</p></body></html>`;
}
function downloadReportJSON(i) {
  const entry = state.history[i];
  downloadFile('eucost-report-'+entry.id+'.json', JSON.stringify(entry.data,null,2), 'application/json');
  showToast('JSON report downloaded.');
}
function downloadReportHTML(i) {
  const entry = state.history[i];
  downloadFile('eucost-report-'+entry.id+'.html', generateSimpleHTMLReport(entry), 'text/html');
  showToast('HTML report downloaded.');
}
function clearHistory() {
  if (!confirm('Clear all analysis history?')) return;
  state.history = [];
  localStorage.removeItem('eucost_history');
  renderReports();
  showToast('History cleared.');
}
function renderReports() {
  const el = document.getElementById('reports-list');
  if (!el) return;
  if (state.history.length === 0) {
    el.innerHTML = `<div class="bg-white border border-eu-border p-10 text-center shadow-sm"><i class="fa-solid fa-folder-open text-gray-300 text-3xl mb-3"></i><p class="text-xs text-gray-400">No analyses yet.<br/>Run your first plan in the <a href="audit.html" class="text-eu-blue underline">Audit Engine</a>.</p></div>`;
    return;
  }
  el.innerHTML = state.history.map((entry,i) => `
    <div class="bg-white border border-eu-border p-5 shadow-sm">
      <div class="flex justify-between items-start mb-3">
        <div>
          <p class="text-[10px] text-gray-400 uppercase tracking-wider">${entry.date}</p>
          <p class="font-semibold text-eu-blue text-sm mt-0.5">${entry.resources} resources · €${fmt(entry.monthly)}/month</p>
        </div>
        <span class="text-xs font-bold px-2.5 py-1 ${entry.score>=90?'bg-green-50 text-green-700':entry.score>=60?'bg-yellow-50 text-yellow-700':'bg-red-50 text-red-600'}">${entry.score}% sovereign</span>
      </div>
      <div class="flex gap-2">
        <button onclick="downloadReportHTML(${i})" class="flex items-center gap-1.5 bg-eu-blue text-white text-xs font-medium px-3 py-1.5 hover:bg-blue-900 transition-colors">
          <i class="fa-solid fa-file-code text-[10px]"></i> HTML
        </button>
        <button onclick="downloadReportJSON(${i})" class="flex items-center gap-1.5 border border-eu-border text-gray-600 text-xs font-medium px-3 py-1.5 hover:bg-gray-50">
          <i class="fa-solid fa-brackets-curly text-[10px]"></i> JSON
        </button>
      </div>
    </div>`).join('');
}
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
    document.getElementById('mobile-menu')?.classList.toggle('hidden');
  });
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    authUser = session.user;
    const { data } = await sb.from('profiles').select('is_pro').eq('id', authUser.id).single();
    authProfile = data;
  }
  const pro = isPro();
  document.getElementById('treasury-gate').classList.toggle('hidden', pro);
  document.getElementById('treasury-main').classList.toggle('hidden', !pro);
  if (pro) {
    document.getElementById('header-pro-badge').classList.remove('hidden');
    ['audit','policies','treasury'].forEach(t => {
      const el = document.getElementById('nav-'+t+'-lock');
      if (el) el.style.display = 'none';
    });
    renderReports();
  }
});
</script>
</body>
</html>
